name: Scaffold Verify (loop)
on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:
concurrency:
  group: scaffold-verify
  cancel-in-progress: false
permissions:
  contents: read
  issues: write
jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        stack: [fastapi, nestjs, nextjs, vite-react]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251  # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 80"
          prompt: |
            Follow skills/scaffold/${{ matrix.stack }}/config-files.md and source-files.md to
            scaffold a brand-new project into /tmp/scaffold-e2e EXACTLY as written - no
            improvisation, no silently fixing template bugs. Then run that stack's quality
            gates (TS stacks: pnpm install, pnpm check or lint+typecheck, pnpm build, pnpm
            test or test:ci; FastAPI: pip install -r requirements.txt, ruff check src/,
            python -m pyright src/, python -m pytest). If any template file is missing, any
            gate fails, or you had to deviate from the written instructions to proceed, exit
            with a failing status and print a precise report naming the broken template
            section and file.
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "scaffold-verify: ${{ matrix.stack }} failed $(date +%F)" \
            --body "Scaffold verification failed for stack \`${{ matrix.stack }}\`.

          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Triage this issue like an accuracy_fix report: identify the broken template section and file named in the agent output, then open a fix PR."

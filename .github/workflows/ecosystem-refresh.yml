name: Ecosystem Refresh (loop)
on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:
concurrency:
  group: ecosystem-refresh
  cancel-in-progress: false
permissions:
  contents: write
  pull-requests: write
jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251  # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--max-turns 60"
          prompt: |
            Execute Step 0b of skills/audit/implementation.md (full web scan, ALL listed
            topics including harness community consensus and loop engineering). Overwrite
            .claude/audit-ecosystem-research.md in the documented format with last-scanned
            set to today. Then create a branch chore/ecosystem-refresh-<YYYYMMDD>, commit
            ONLY that file, and open a PR summarising: new versions, new advisories,
            RECOMMENDED/CONSENSUS harness findings, and any finding that invalidates a
            current skill (flag those as audit candidates). Do not modify any other file.

name: Validate Skills

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - '.claude-plugin/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - 'EXAMPLES.md'
      - 'CONTRIBUTING.md'
      - 'FUTURE.md'
      - 'SECURITY.md'
      - '.claude/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - '.claude-plugin/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'AGENTS.md'
      - 'EXAMPLES.md'
      - 'CONTRIBUTING.md'
      - 'FUTURE.md'
      - 'SECURITY.md'
      - '.claude/**'
      - '.github/workflows/**'

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate SKILL.md frontmatter
        run: |
          failed=0
          for skill_file in skills/*/SKILL.md; do
            first_line=$(head -1 "$skill_file")
            if [ "$first_line" != "---" ]; then
              echo "SKIP: $skill_file (no YAML frontmatter — internal utility)"
              continue
            fi

            name=$(grep -m1 '^name:' "$skill_file" | sed 's/name:[[:space:]]*//' | tr -d '"')
            description=$(grep -m1 '^description:' "$skill_file" | sed 's/description:[[:space:]]*//' | tr -d '"')

            file_ok=1
            if [ -z "$name" ]; then
              echo "FAIL: $skill_file — missing 'name' in frontmatter"
              failed=1
              file_ok=0
            fi
            if [ -z "$description" ]; then
              echo "FAIL: $skill_file — missing 'description' in frontmatter"
              failed=1
              file_ok=0
            fi
            if [ $file_ok -eq 1 ]; then
              echo "OK:   $skill_file"
            fi
          done

          if [ $failed -ne 0 ]; then
            echo ""
            echo "One or more skills have invalid frontmatter. Fix before merging."
            exit 1
          fi

      - name: Check all skill directories have a SKILL.md
        run: |
          failed=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "FAIL: skills/$skill_name/ exists but has no SKILL.md"
              failed=1
            fi
          done
          if [ $failed -ne 0 ]; then
            exit 1
          fi
          echo "All skill directories have a SKILL.md"

  lint-patterns:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run skill lint checks
        run: bash scripts/lint-skills.sh skills/

  plugin-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate manifest files
        env:
          STRICT_DOC_SYNC: "1"
        run: bash scripts/validate-manifest.sh .claude-plugin

  shell-lint:
    name: Shellcheck repo scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: shellcheck + bash -n
        run: |
          shellcheck scripts/*.sh
          for f in scripts/*.sh; do bash -n "$f"; done

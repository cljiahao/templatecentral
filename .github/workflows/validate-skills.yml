name: Validate Skills

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - '.claude-plugin/**'
  pull_request:
    paths:
      - 'skills/**'
      - 'scripts/**'
      - '.claude-plugin/**'

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate SKILL.md frontmatter
        run: |
          failed=0
          for skill_file in skills/*/SKILL.md; do
            first_line=$(head -1 "$skill_file")
            if [ "$first_line" != "---" ]; then
              echo "SKIP: $skill_file (no YAML frontmatter — internal utility)"
              continue
            fi

            name=$(grep -m1 '^name:' "$skill_file" | sed 's/name:[[:space:]]*//' | tr -d '"')
            description=$(grep -m1 '^description:' "$skill_file" | sed 's/description:[[:space:]]*//' | tr -d '"')

            file_ok=1
            if [ -z "$name" ]; then
              echo "FAIL: $skill_file — missing 'name' in frontmatter"
              failed=1
              file_ok=0
            fi
            if [ -z "$description" ]; then
              echo "FAIL: $skill_file — missing 'description' in frontmatter"
              failed=1
              file_ok=0
            fi
            if [ $file_ok -eq 1 ]; then
              echo "OK:   $skill_file"
            fi
          done

          if [ $failed -ne 0 ]; then
            echo ""
            echo "One or more skills have invalid frontmatter. Fix before merging."
            exit 1
          fi

      - name: Check all skill directories have a SKILL.md
        run: |
          failed=0
          for skill_dir in skills/*/; do
            skill_name=$(basename "$skill_dir")
            skill_file="${skill_dir}SKILL.md"
            if [ ! -f "$skill_file" ]; then
              echo "FAIL: skills/$skill_name/ exists but has no SKILL.md"
              failed=1
            fi
          done
          if [ $failed -ne 0 ]; then
            exit 1
          fi
          echo "All skill directories have a SKILL.md"

  lint-patterns:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run skill lint checks
        run: bash scripts/lint-skills.sh skills/

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check for hardcoded secrets in skill files
        run: |
          failed=0
          while IFS= read -r line; do
            file=$(echo "$line" | cut -d: -f1)
            lineno=$(echo "$line" | cut -d: -f2)
            echo "FAIL: $file:$lineno — potential hardcoded secret"
            failed=1
          done < <(grep -rPn \
            '(?i)(better_auth_secret|secret_key|database_url|api_key|private_key|access_token)\s*=\s*(?![\s${\x27"<#])(?!.*\.\.\.)(?!.*<.*>)(?!.*change.me)(?!.*your-).{8,}' \
            skills/ 2>/dev/null || true)

          if [ $failed -ne 0 ]; then
            echo ""
            echo "Review the above lines and replace any real secrets with placeholder syntax."
            exit 1
          fi
          echo "OK: No hardcoded secrets detected in skill files"

  plugin-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Validate manifest files
        run: bash scripts/validate-manifest.sh .claude-plugin

      - name: Validate plugin.json extended fields
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('.claude-plugin/plugin.json'));
            const required = ['displayName','homepage','repository','license'];
            const missing = required.filter(f => !p[f]);
            if (missing.length) { console.error('Missing fields:', missing.join(', ')); process.exit(1); }
            console.log('plugin.json extended fields OK');
          "

  shell-lint:
    name: Shellcheck repo scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: shellcheck + bash -n
        run: |
          shellcheck scripts/*.sh
          for f in scripts/*.sh; do bash -n "$f"; done
